{% extends 'base.html' %}

{% block content %}

  <form method="post">
    {% csrf_token %}

    <div class="form_group">
      {{ user_form.username.errors }}
      <label>Usuario: </label>
      {{ user_form.username }}
    </div>

    <div class="form_group">
      {{ user_form.username.password1 }}
      <label>Senha: </label>
      {{ user_form.password1 }}
    </div>

    <div class="form_group">
      {{ user_form.username.password2 }}
      <label>Confirmacao de senha: </label>
      {{ user_form.password2 }}
    </div>

    <div class="form_group">
      <input type="submit" value="Cadastrar">
    </div>

  </form>

{% endblock %}
